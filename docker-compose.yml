services:
  postgres:
    image: postgres:16
    container_name: payto-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: payto_engine
      POSTGRES_USER: payto
      POSTGRES_PASSWORD: payto
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: payto-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
